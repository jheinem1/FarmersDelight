name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v1.21.11-1.2.10a"
        required: true
      release_name:
        description: "Optional release title"
        required: false
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build mod jar
        run: ./gradlew clean build

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_NAME}"
          else
            tag_name="${{ github.event.inputs.tag_name }}"
          fi

          release_name="${{ github.event.inputs.release_name }}"
          if [[ -z "${release_name}" ]]; then
            release_name="${tag_name}"
          fi

          shopt -s nullglob
          jars=(build/libs/*.jar)
          release_jars=()
          for jar in "${jars[@]}"; do
            case "${jar}" in
              *-sources.jar|*-javadoc.jar)
                ;;
              *)
                release_jars+=("${jar}")
                ;;
            esac
          done

          if [[ "${#release_jars[@]}" -ne 1 ]]; then
            echo "Expected exactly one release jar in build/libs, found ${#release_jars[@]}." >&2
            printf '%s\n' "${release_jars[@]}" >&2
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "jar_path=${release_jars[0]}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: ${{ steps.release_meta.outputs.jar_path }}
